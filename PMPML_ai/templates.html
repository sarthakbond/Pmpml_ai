<!DOCTYPE html>
<html>
<head>
    <title>PMPML AI-Connect</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .controls { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="controls">
        <h3>PMPML AI-Connect</h3>
        <p>Location: Handewadi / Uruli Devachi</p>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([18.4526, 73.9455], 16);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        L.marker([18.4526, 73.9455]).addTo(map)
            .bindPopup('Keystone School of Engineering')
            .openPopup();
            
        L.circle([18.4526, 73.9455], {
            color: 'blue',
            fillColor: '#30f',
            fillOpacity: 0.1,
            radius: 500
        }).addTo(map);
    </script>
</body>
</html>
